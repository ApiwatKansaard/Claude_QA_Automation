<details class="collapsible-card rounded-2xl mb-6" style="background: var(--color-gray-9)" open="">
  <summary class="flex items-center gap-3 cursor-pointer list-none p-4" data-part="summary">
    <div class="flex-1 min-w-0">
      <p class="text-sm font-medium text-[var(--color-gray-1)] clamp-2" data-part="title">Section Title</p>
      <p class="text-xs italic text-[var(--color-gray-5)] clamp-2" data-part="subtitle">Section subtitle</p>
    </div>
    <span class="collapsible-toggle shrink-0 self-start">
      <i class="fa-regular fa-plus text-xs text-[var(--color-gray-3)]"></i>
      <i class="fa-regular fa-minus text-xs text-[var(--color-gray-3)]"></i>
    </span>
  </summary>
  <div class="flex flex-col gap-3 px-4 pb-4" data-part="body">
    <div class="bg-white rounded-xl p-4">
      <p class="text-[var(--color-gray-1)]">Content row one</p>
    </div>
    <div class="bg-white rounded-xl p-4">
      <p class="text-[var(--color-gray-1)]">Content row two</p>
    </div>
  </div>
</details>
